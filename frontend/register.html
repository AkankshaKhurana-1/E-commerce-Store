<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — ShopEase</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="index.html" class="nav-logo">Shop<span>Ease</span></a>
    <div class="nav-links" id="nav-links" style="display:flex">
      <a href="login.html"    id="nav-login">Login</a>
      <a href="register.html" id="nav-register" class="active">Register</a>
      <a href="#" id="nav-user"   style="display:none;color:var(--accent)"></a>
      <a href="#" id="nav-logout" style="display:none">Logout</a>
      <a href="cart.html" class="cart-icon">
        🛒 <span class="cart-badge" id="cart-badge" style="display:none">0</span>
      </a>
    </div>
  </div>
</nav>

<main class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🛍️ ShopEase</div>
      <h2>Create Your Account</h2>
      <p>Join thousands of happy shoppers today</p>
    </div>

    <div id="form-alert" class="alert" style="display:none"></div>

    <form id="register-form" novalidate>
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" class="form-control" placeholder="John Doe" autocomplete="name" required />
        <span class="field-error" id="name-error" style="display:none"></span>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="john@example.com" autocomplete="email" required />
        <span class="field-error" id="email-error" style="display:none"></span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" class="form-control" placeholder="Min. 6 characters" autocomplete="new-password" required />
          <button type="button" class="toggle-password" data-target="password">👁️</button>
        </div>
        <span class="field-error" id="password-error" style="display:none"></span>
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <div class="password-wrapper">
          <input type="password" id="confirm-password" class="form-control" placeholder="Repeat your password" autocomplete="new-password" required />
          <button type="button" class="toggle-password" data-target="confirm-password">👁️</button>
        </div>
        <span class="field-error" id="confirm-password-error" style="display:none"></span>
      </div>

      <div style="font-size:.82rem;color:var(--text-muted);margin-bottom:1.25rem">
        By creating an account you agree to our
        <a href="#" style="color:var(--primary)">Terms of Service</a> and
        <a href="#" style="color:var(--primary)">Privacy Policy</a>.
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg">Create Account</button>
    </form>

    <div class="divider">or</div>
    <div class="auth-footer">Already have an account? <a href="login.html">Sign in here</a></div>
  </div>
</main>

<script src="js/config.js"></script>
<script src="js/cart.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
