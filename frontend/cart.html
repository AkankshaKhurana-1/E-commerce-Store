<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopping Cart — ShopEase</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="index.html" class="nav-logo">Shop<span>Ease</span></a>
    <form class="nav-search" id="nav-search-form">
      <span class="search-icon">🔍</span>
      <input type="text" id="nav-search-input" placeholder="Search products…" autocomplete="off" />
    </form>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links" id="nav-links">
      <a href="index.html">🏠 Home</a>
      <a href="login.html"    id="nav-login">Login</a>
      <a href="register.html" id="nav-register">Register</a>
      <a href="#" id="nav-user"   style="display:none;color:var(--accent)"></a>
      <a href="#" id="nav-logout" style="display:none">Logout</a>
      <a href="cart.html" class="cart-icon active">
        🛒 <span class="cart-badge" id="cart-badge" style="display:none">0</span>
      </a>
    </div>
  </div>
</nav>

<div style="background:var(--white);border-bottom:1px solid var(--border);padding:1.5rem 0">
  <div class="container">
    <h1 style="font-size:1.75rem">🛒 Shopping Cart</h1>
  </div>
</div>

<main class="cart-page">
  <div class="container">
    <!-- cart.js renders into this div -->
    <div id="cart-container">
      <div style="text-align:center;padding:3rem">
        <div class="spinner" style="margin:0 auto"></div>
      </div>
    </div>
  </div>
</main>

<footer>
  <div class="container">
    <div class="footer-bottom" style="padding:1.5rem 0">
      <span>© 2024 ShopEase — <a href="#">CodeAlpha Internship Project</a></span>
      <span>Made with ❤️ using Node.js, Express &amp; MongoDB</span>
    </div>
  </div>
</footer>

<script src="js/config.js"></script>
<script src="js/cart.js"></script>
</body>
</html>
