<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Details — ShopEase</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="index.html" class="nav-logo">Shop<span>Ease</span></a>
    <form class="nav-search" id="nav-search-form">
      <span class="search-icon">🔍</span>
      <input type="text" id="nav-search-input" placeholder="Search products…" autocomplete="off" />
    </form>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links" id="nav-links">
      <a href="index.html">🏠 Home</a>
      <a href="login.html"    id="nav-login">Login</a>
      <a href="register.html" id="nav-register">Register</a>
      <a href="#" id="nav-user"   style="display:none;color:var(--accent)"></a>
      <a href="#" id="nav-logout" style="display:none">Logout</a>
      <a href="cart.html" class="cart-icon">
        🛒 <span class="cart-badge" id="cart-badge" style="display:none">0</span>
      </a>
    </div>
  </div>
</nav>

<!-- Breadcrumb -->
<div style="background:var(--white);border-bottom:1px solid var(--border)">
  <div class="container">
    <nav class="breadcrumb">
      <a href="index.html">Home</a>
      <span class="breadcrumb-sep">›</span>
      <a href="index.html">Products</a>
      <span class="breadcrumb-sep">›</span>
      <span id="breadcrumb-product-name" style="color:var(--text-muted)">Loading…</span>
    </nav>
  </div>
</div>

<main class="product-detail">
  <div class="container">
    <!-- Skeleton loader shown until JS populates -->
    <div id="product-detail-container">
      <div class="product-detail-grid">
        <div class="loading-skeleton" style="aspect-ratio:1/1;border-radius:var(--radius)"></div>
        <div style="display:flex;flex-direction:column;gap:1rem">
          <div class="loading-skeleton" style="height:14px;width:30%"></div>
          <div class="loading-skeleton" style="height:36px;width:80%"></div>
          <div class="loading-skeleton" style="height:28px;width:25%"></div>
          <div class="loading-skeleton" style="height:20px;width:40%"></div>
          <div class="loading-skeleton" style="height:80px;width:100%"></div>
          <div class="loading-skeleton" style="height:50px;width:60%"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<footer>
  <div class="container">
    <div class="footer-bottom" style="padding:1.5rem 0">
      <span>© 2024 ShopEase — <a href="#">CodeAlpha Internship Project</a></span>
      <span>Made with ❤️ using Node.js, Express &amp; MongoDB</span>
    </div>
  </div>
</footer>

<script src="js/config.js"></script>
<script src="js/cart.js"></script>
<script src="js/products.js"></script>
</body>
</html>
